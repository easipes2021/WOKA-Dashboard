<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#0077cc" />

  <title>WOKA Streamflow Dashboard</title>

  <link rel="stylesheet" href="global.css"t src="https://cdn.jsdelivr.net/npm/chart.jsscript src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fnsead>
<body>
  <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
    🌙 Theme
  </button>

  <header class="page-header">
    <div class="page-header__inner">
      <p class="eyebrow">WOKA Whitewater Park</p>
      <h1>WOKA Dashboard</h1>
      <p class="subheading">
        Live river, lake, and temperature conditions for park operations and visitor awareness.
      </p>
    </div>
  </header>

  <main class="dashboard-shell">
    <section class="dashboard-grid" aria-label="WOKA conditions dashboard">

      <!-- Air Temp -->
      <article class="card metric-card">
        <div class="card-header">
          <h2>Air Temperature (Watts)</h2>
        </div>
        <div id="airTemp" class="big-number">-- °F</div>
        <div id="airTempTime" class="timestamp">Updated: --:--</div>
      </article>

      <!-- Water Temp -->
      <article class="card metric-card">
        <div class="card-header">
          <h2>Water Temperature (Watts)</h2>
        </div>
        <div id="waterTempCurrent" class="big-number">
