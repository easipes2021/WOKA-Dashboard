name: Fetch USGS Data

on:
  workflow_dispatch:   # Allows you to run manually
  schedule:
    - cron: "0 3 * * *"   # Runs every day at 3:00 AM UTC

jobs:
  fetch-usgs:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ Use Node 24 now

    steps:
    - name: Check out repository
      uses: actions/checkout@v4   # ✅ Node 24-compatible version

    - name: Set up Python
      uses: actions/setup-python@v5   # ✅ Node 24-compatible version
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip requests

    - name: Fetch USGS Data
      env:
        USGS_API_KEY: ${{ secrets.USGS_API_KEY }}   # ✅ Your secure key
      run: |
        python scripts/fetch_usgs_data.py

    - name: Commit updated data
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "github-actions"
        git add data/usgs_07195430.json
        git commit -m "Update USGS data" || echo "No changes to commit"

    - name: Push changes
      uses: ad-m/github-push-action@v0.8.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
